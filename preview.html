<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪能量日记 - 浏览器预览版</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .preview-banner {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ffeeba;
        }
        .preview-banner a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .preview-banner a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="preview-banner">
            🌟 浏览器预览版 - 要打包成桌面应用，请运行 <code>npm start</code> 或查看 <a href="QUICKSTART.md">快速开始指南</a>
        </div>
    </div>
    
    <script>
        // 自动加载主应用
        fetch('index.html')
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // 移除原HTML中的head和body标签，只保留内容
                const content = doc.body.innerHTML;
                const styles = doc.querySelector('style') ? doc.querySelector('style').outerHTML : '';
                
                document.querySelector('.container').innerHTML = styles + content;
            })
            .catch(err => {
                console.error('加载失败:', err);
                document.querySelector('.container').innerHTML = `
                    <div style="padding: 40px; text-align: center;">
                        <h2>预览加载失败</h2>
                        <p>请确保 index.html 文件存在</p>
                        <p>或者直接运行 <code>npm start</code> 启动完整应用</p>
                    </div>
                `;
            });
    </script>
</body>
</html>

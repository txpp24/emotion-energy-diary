<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#667eea">
    <title>情绪能量日记 - 浏览器版</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .browser-notice {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ffeeba;
            margin-bottom: 0;
            border-radius: 20px 20px 0 0;
        }

        .browser-notice a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .browser-notice a:hover {
            text-decoration: underline;
        }

        .container {
            border-radius: 0 0 20px 20px !important;
        }
    </style>
</head>

<body>
    <div class="browser-notice">
        🌟 浏览器预览版 - 数据存储在浏览器本地。要打包成桌面应用，请运行 <code>npm start</code> 或查看 <a href="QUICKSTART.md"
            target="_blank">快速开始指南</a>
    </div>
    <div class="container">
        <header>
            <h1>情绪能量日记</h1>
            <p class="subtitle">记录当下，治愈自己</p>
            <button id="themeToggle" class="theme-toggle" title="切换主题">🌙</button>
        </header>

        <div class="quote-section">
            <div class="quote-box">
                <p id="dailyQuote" class="quote-text"></p>
                <button id="newQuoteBtn" class="icon-btn" title="换一句">✨</button>
            </div>
        </div>

        <nav class="nav-tabs">
            <button class="nav-tab active" data-tab="record">📝 记录</button>
            <button class="nav-tab" data-tab="stats">📊 统计</button>
            <button class="nav-tab" data-tab="chart">📈 图表</button>
            <button class="nav-tab" data-tab="history">📋 历史</button>
        </nav>

        <div class="tab-content">
            <div class="tab-pane active" id="tab-record">
                <div class="record-section">
                    <h2>记录此刻</h2>

                    <div class="form-group">
                        <label>选择情绪 <button id="manageEmotionsBtn" class="manage-emotions-btn"
                                title="管理情绪">⚙️</button></label>
                        <div class="emotion-tags" id="emotionTags">
                            <button class="emotion-btn" data-emotion="开心">😊 开心</button>
                            <button class="emotion-btn" data-emotion="平静">😌 平静</button>
                            <button class="emotion-btn" data-emotion="焦虑">😰 焦虑</button>
                            <button class="emotion-btn" data-emotion="愤怒">😠 愤怒</button>
                            <button class="emotion-btn" data-emotion="悲伤">😢 悲伤</button>
                            <button class="emotion-btn" data-emotion="疲惫">😴 疲惫</button>
                            <button class="emotion-btn" data-emotion="兴奋">🤩 兴奋</button>
                            <button class="emotion-btn" data-emotion="困惑">😕 困惑</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>能量值 (1-10)</label>
                        <div class="energy-slider">
                            <input type="range" id="energyValue" min="1" max="10" value="5">
                            <div class="energy-display">
                                <span id="energyNumber">5</span>
                                <div class="energy-labels">
                                    <span>低</span>
                                    <span>高</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>触发原因</label>
                        <input type="text" id="triggerReason" placeholder="用一句话描述..." maxlength="100">
                    </div>

                    <div class="form-group">
                        <label>今日能量目标</label>
                        <div class="goal-section">
                            <div class="goal-input">
                                <input type="number" id="energyGoal" min="1" max="10" value="5" placeholder="1-10">
                                <span class="goal-unit">分</span>
                            </div>
                            <button id="setGoalBtn" class="set-goal-btn">设定目标</button>
                        </div>
                    </div>

                    <div class="goal-progress" id="goalProgress" style="display: none;">
                        <div class="progress-label">
                            <span>今日进度</span>
                            <span id="progressText">0/5</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                        </div>
                        <div class="progress-message" id="progressMessage"></div>
                    </div>

                    <button id="saveBtn" class="save-btn">保存记录</button>
                </div>
            </div>

            <div class="tab-pane" id="tab-stats">
                <div class="stats-section">
                    <h2>数据统计</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon stat-icon-energy">⚡</div>
                            <div class="stat-value" id="avgEnergy">--</div>
                            <div class="stat-label">平均能量</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon stat-icon-emotion">💜</div>
                            <div class="stat-value" id="commonEmotion">--</div>
                            <div class="stat-label">常见情绪</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon stat-icon-streak">🔥</div>
                            <div class="stat-value" id="streakDays">--</div>
                            <div class="stat-label">连续天数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon stat-icon-records">📊</div>
                            <div class="stat-value" id="totalRecords">--</div>
                            <div class="stat-label">总记录数</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane" id="tab-chart">
                <div class="chart-section">
                    <div class="chart-header">
                        <h2>能量趋势</h2>
                        <div class="chart-controls">
                            <button class="chart-btn active" data-period="day">日</button>
                            <button class="chart-btn" data-period="week">周</button>
                            <button class="chart-btn" data-period="month">月</button>
                        </div>
                    </div>
                    <div class="chart-info" id="chartInfo">显示最近7天的数据</div>
                    <div class="chart-container">
                        <canvas id="energyChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="tab-pane" id="tab-history">
                <div class="history-section">
                    <div class="history-header">
                        <h2>历史记录</h2>
                        <div class="history-actions">
                            <div class="export-dropdown">
                                <button id="exportBtn" class="export-btn">导出数据 ▼</button>
                                <div class="export-menu">
                                    <button id="exportCSV" class="export-menu-item">导出CSV</button>
                                    <button id="exportJSON" class="export-menu-item">导出JSON</button>
                                </div>
                            </div>
                            <button id="importBtn" class="import-btn">导入数据</button>
                            <input type="file" id="importFile" accept=".json" style="display: none;">
                        </div>
                    </div>
                    <div class="history-list" id="historyList">
                        <p class="empty-message">还没有记录，开始记录你的情绪吧~</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="emotionModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>管理情绪标签</h3>
                    <button class="modal-close" id="closeEmotionModal">×</button>
                </div>
                <div class="modal-body">
                    <div class="add-emotion">
                        <input type="text" id="newEmotionName" placeholder="情绪名称" maxlength="10">
                        <input type="text" id="newEmotionEmoji" placeholder="表情" maxlength="2">
                        <button id="addEmotionBtn" class="add-emotion-btn">添加</button>
                    </div>
                    <div class="emotion-list" id="emotionList"></div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
        <script src="app.js"></script>
</body>

</html>
